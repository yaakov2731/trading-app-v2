<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES Extremo Volumen — Señal Automática</title>
<style>
  :root {
    --bg:      #0d1117;
    --surf:    #161b22;
    --surf2:   #1c2128;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --green:   #3fb950;
    --red:     #f85149;
    --blue:    #58a6ff;
    --yellow:  #e3b341;
    --purple:  #bc8cff;
    --orange:  #ffa657;
    --elite:   #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .hdr { padding: 14px 20px; background: var(--surf); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .hdr-title { font-size: 15px; font-weight: 700; }
  .hdr-title span { color: var(--blue); }
  .hdr-sub { font-size: 11px; color: var(--muted); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 49px); }
  @media(max-width:860px){ .layout { grid-template-columns:1fr; } }

  /* LEFT */
  .left { border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .sec-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  input[type=number], select {
    width: 100%; padding: 8px 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  input[type=number] { font-family: monospace; }
  input:focus, select:focus { border-color: var(--blue); }
  .hint { font-size: 10px; color: var(--muted); text-align: center; cursor: pointer; }
  .hint span { color: var(--blue); text-decoration: underline; }

  /* RIGHT */
  .right { padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }

  /* SIGNAL HERO */
  .signal-hero {
    background: var(--surf); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .signal-hero-top {
    padding: 20px 24px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center;
  }
  .sig-box {
    border-radius: 10px; padding: 16px 20px; text-align: center;
    border: 2px solid transparent; transition: all .2s; cursor: default;
  }
  .sig-box.winner { border-color: var(--green); background: #3fb95011; }
  .sig-box.loser  { opacity: .5; }
  .sig-dir  { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .sig-wr   { font-size: 36px; font-weight: 900; }
  .sig-rule { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .sig-n    { font-size: 10px; color: var(--muted); }
  .vs-col   { text-align: center; }
  .vs-label { font-size: 22px; font-weight: 700; color: var(--muted); }
  .vs-rec   { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .signal-hero-bot {
    border-top: 1px solid var(--border); padding: 12px 24px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .tag { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tag-green  { background: #3fb95022; color: var(--green); }
  .tag-red    { background: #f8514922; color: var(--red); }
  .tag-yellow { background: #e3b34122; color: var(--yellow); }
  .tag-blue   { background: #58a6ff22; color: var(--blue); }
  .tag-muted  { background: #ffffff08; color: var(--muted); }
  .tag-elite  { background: #ffd70022; color: var(--elite); border: 1px solid #ffd70033; }

  /* HOUR CHART */
  .hour-chart { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .hour-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .hr-row { display: flex; align-items: center; gap: 8px; }
  .hr-time { font-size: 11px; font-family: monospace; color: var(--muted); width: 55px; }
  .hr-bar-wrap { flex: 1; height: 20px; background: #ffffff06; border-radius: 4px; position: relative; overflow: hidden; }
  .hr-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 700; transition: width .4s ease; }
  .hr-bar.best { background: linear-gradient(90deg, #3fb95088, #3fb950cc); color: #fff; }
  .hr-bar.good { background: #58a6ff44; color: var(--blue); }
  .hr-bar.ok   { background: #e3b34133; color: var(--yellow); }
  .hr-bar.bad  { background: #f8514922; color: var(--red); }
  .hr-wr  { font-size: 12px; font-weight: 700; width: 44px; text-align: right; font-family: monospace; }
  .hr-n   { font-size: 10px; color: var(--muted); width: 36px; text-align: right; }
  .hr-dir { font-size: 10px; width: 36px; text-align: center; }
  .best-hour-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #3fb95022; border: 1px solid #3fb95055; color: var(--green);
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
    margin-top: 10px;
  }

  /* LEVELS */
  .levels-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .levels-hdr { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .levels-hdr h3 { font-size: 13px; font-weight: 600; }
  .rr-pill { background: #3fb95022; color: var(--green); border: 1px solid #3fb95033; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 7px 14px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 500; text-align: left; }
  td { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 13px; }
  td.mono { font-family: monospace; font-size: 14px; font-weight: 600; }
  .c-green  { color: var(--green); }
  .c-red    { color: var(--red); }
  .c-blue   { color: var(--blue); }
  .c-yellow { color: var(--yellow); }
  .c-muted  { color: var(--muted); }
  tr.row-stop   { background: #f8514906; }
  tr.row-entry  { background: #58a6ff06; }
  tr.row-target { background: #3fb95006; }

  /* RANGE VISUAL */
  .range-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .rng-bar { position: relative; height: 36px; background: #ffffff06; border-radius: 8px; overflow: hidden; margin: 10px 0; }
  .rng-z-low  { position: absolute; left: 0; top: 0; height: 100%; background: #f8514918; border-right: 2px solid var(--red); }
  .rng-z-high { position: absolute; right: 0; top: 0; height: 100%; background: #3fb95018; border-left: 2px solid var(--green); }
  .rng-cursor { position: absolute; top: 0; width: 3px; height: 100%; background: var(--yellow); transform: translateX(-50%); border-radius: 2px; }
  .rng-labels { display: flex; justify-content: space-between; font-size: 11px; }

  /* CHECKLIST */
  .check-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .chk-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg); border-radius: 6px; margin-top: 6px; border: 1px solid transparent; }
  .chk-item.pass { border-color: #3fb95033; }
  .chk-item.fail { border-color: #f8514922; }
  .chk-icon { font-size: 15px; width: 20px; }
  .chk-text { font-size: 12px; }

  /* EMPTY */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 12px; color: var(--muted); }
  .empty svg { opacity: .25; }
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">ES <span>Extremo Volumen</span></div>
    <div class="hdr-sub">Señal automática · 1,092 setups · 2015–2026 · Walk-Forward</div>
  </div>
  <div style="font-size:11px;color:var(--muted)">yaakov2731</div>
</header>

<div class="layout">
  <!-- LEFT: INPUTS -->
  <div class="left">
    <div>
      <div class="sec-label">Día Anterior</div>
      <div class="g2">
        <div class="field"><label>High</label><input type="number" id="pH" step="0.25" placeholder="6983.75" oninput="auto()"></div>
        <div class="field"><label>Low</label><input type="number" id="pL" step="0.25" placeholder="6892.25" oninput="auto()"></div>
      </div>
      <div class="g2" style="margin-top:8px">
        <div class="field"><label>Close</label><input type="number" id="pC" step="0.25" placeholder="6948.50" oninput="auto()"></div>
        <div class="field"><label>Open (opc.)</label><input type="number" id="pO" step="0.25" placeholder="" oninput="auto()"></div>
      </div>
    </div>

    <div>
      <div class="sec-label">Hoy</div>
      <div class="g2">
        <div class="field"><label>Open hoy</label><input type="number" id="cO" step="0.25" placeholder="6948.50" oninput="auto()"></div>
        <div class="field"><label>Precio actual</label><input type="number" id="cP" step="0.25" placeholder="auto-dir" oninput="auto()"></div>
      </div>
    </div>

    <div>
      <div class="sec-label">Contexto de Entrada</div>
      <div class="g3">
        <div class="field">
          <label>Día</label>
          <select id="dow" onchange="auto()">
            <option value="1">Mar</option>
            <option value="2">Mié</option>
            <option value="3">Jue</option>
            <option value="4">Vie</option>
            <option value="0">Lun</option>
          </select>
        </div>
        <div class="field">
          <label>Hora ET</label>
          <select id="hour" onchange="auto()">
            <option value="9">9 AM</option>
            <option value="10">10 AM</option>
            <option value="11">11 AM</option>
            <option value="12">12 PM</option>
            <option value="13">1 PM</option>
            <option value="14">2 PM</option>
            <option value="15">3 PM</option>
          </select>
        </div>
        <div class="field">
          <label>Dirección</label>
          <select id="dir" onchange="auto()">
            <option value="auto">Auto</option>
            <option value="long">Long</option>
            <option value="short">Short</option>
          </select>
        </div>
      </div>
      <div style="margin-top:8px">
        <div class="field">
          <label>Rango previo vs últimos 252 días</label>
          <select id="vr" onchange="auto()">
            <option value="0.85">Muy grande — top 15% (ELITE)</option>
            <option value="0.75">Grande — top 25%</option>
            <option value="0.50" selected>Normal — 33-66%</option>
            <option value="0.20">Comprimido — bajo 33%</option>
          </select>
        </div>
      </div>
      <div style="margin-top:8px">
        <div class="field">
          <label>Volumen barra de toque</label>
          <select id="vol" onchange="auto()">
            <option value="0.3">Muy bajo — ideal</option>
            <option value="0.6" selected>Bajo — bueno</option>
            <option value="0.85">Normal — aceptable</option>
          </select>
        </div>
      </div>
    </div>

    <p class="hint"><span onclick="example()">Cargar ejemplo (26-Feb-2026)</span></p>
  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="right" id="out">
    <div class="empty" id="empty-msg">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <p>Ingresa High, Low, Close del día anterior<br>y Open de hoy — la señal aparece automáticamente</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// BACKTEST DATA — VERIFIED 2015-2026 WALK-FORWARD
// ═══════════════════════════════════════════════════════

// Win rates by hour and direction (from real backtest)
const WR = {
  //  hour: { long: [wr, n],  short: [wr, n] }
  9:  { long: [96.1, 204], short: [88.8, 268] },
  10: { long: [82.1,  67], short: [82.3, 130] },
  11: { long: [74.1,  27], short: [62.7,  75] },
  12: { long: [73.9,  23], short: [63.1,  65] },
  13: { long: [76.9,  13], short: [62.3,  53] },
  14: { long: [63.6,  11], short: [60.3,  63] },
  15: { long: [100.0, 29], short: [100.0, 64] },
};

// Win rates by hour and day-of-week (0=Mon)
const WR_DOW = {
  9:  { 0:85.1, 1:92.7, 2:99.2, 3:92.5, 4:88.0 },
  10: { 0:81.9, 1:83.3, 2:85.7, 3:77.8, 4:82.0 },
  11: { 0:58.3, 1:66.7, 2:70.8, 3:72.2, 4:63.0 },
  12: { 0:71.4, 1:66.7, 2:61.5, 3:64.3, 4:65.0 },
  13: { 0:62.5, 1:63.6, 2:56.2, 3:83.3, 4:63.0 },
  14: { 0:52.4, 1:61.9, 2:73.3, 3:58.8, 4:60.0 },
  15: { 0:100,  1:100,  2:100,  3:100,  4:100  },
};

// Hour chart display data
const HOURS = [
  { h:9,  label:'9:00 AM', long:96.1, short:88.8, n:472,  cls:'best' },
  { h:10, label:'10:00 AM',long:82.1, short:82.3, n:197,  cls:'good' },
  { h:11, label:'11:00 AM',long:74.1, short:62.7, n:102,  cls:'ok'   },
  { h:12, label:'12:00 PM',long:73.9, short:63.1, n:88,   cls:'ok'   },
  { h:13, label:'1:00 PM', long:76.9, short:62.3, n:66,   cls:'ok'   },
  { h:14, label:'2:00 PM', long:63.6, short:60.3, n:74,   cls:'bad'  },
  { h:15, label:'3:00 PM', long:100,  short:100,  n:93,   cls:'best' },
];

const YEARLY = [
  {y:2015,n:99, wr:77.8},{y:2016,n:77, wr:80.5},{y:2017,n:135,wr:83.7},
  {y:2018,n:109,wr:84.4},{y:2019,n:134,wr:91.0},{y:2020,n:75, wr:77.3},
  {y:2021,n:124,wr:75.0},{y:2022,n:41, wr:85.4},{y:2023,n:58, wr:87.9},
  {y:2024,n:106,wr:83.0},{y:2025,n:119,wr:83.2},
];

// ═══════════════════════════════════════════════════════
// LOGIC
// ═══════════════════════════════════════════════════════
function g(id){ return document.getElementById(id); }
function fv(id){ return parseFloat(g(id).value) || null; }
function iv(id){ return parseInt(g(id).value); }

function autoDir(price, pH, pL) {
  if (!price) return null;
  const range = pH - pL;
  if (price >= pH - 0.25 * range) return 'short';
  if (price <= pL + 0.25 * range) return 'long';
  return null;
}

function getRule(hour, dir, dow, volRegime) {
  const isElite = hour === 9 && volRegime >= 0.66;
  if (isElite)                       return { id:'ELITE',   label:'ELITE',   color:'var(--elite)' };
  if (hour === 9 && dow !== 0 && dir === 'long')  return { id:'C', label:'REGLA C', color:'var(--green)' };
  if (hour === 9 && dow !== 0)       return { id:'B',       label:'REGLA B', color:'var(--blue)'  };
  if (hour === 9)                    return { id:'A',       label:'REGLA A', color:'var(--purple)' };
  if (hour === 10)                   return { id:'BONUS',   label:'BONUS',   color:'var(--orange)' };
  return { id:'BASE', label:'FUERA VENTANA', color:'var(--muted)' };
}

function adjustedWR(baseWR, hour, dow, dir, volRegime) {
  // Combine direction base WR with DOW adjustment
  const dowWR  = (WR_DOW[hour] || {})[dow] || baseWR;
  const dirWR  = (WR[hour] || {})[dir] || [baseWR, 0];
  // Weighted average: 60% dirWR + 40% dowWR
  let wr = dirWR[0] * 0.6 + dowWR * 0.4;
  // Vol regime boost/penalty
  if (volRegime >= 0.66) wr = Math.min(100, wr + 3);
  else if (volRegime < 0.33) wr = Math.max(50, wr - 3);
  return wr.toFixed(1);
}

function levels(pH, pL, dir) {
  const range = pH - pL;
  const zTop  = pH - 0.25 * range;
  const zBot  = pL + 0.25 * range;
  let entry, target, stop, tp1, tp2;
  if (dir === 'short') {
    entry = zTop; target = zBot; stop = pH + range * 0.1;
    tp1 = entry - (entry - target) * 0.5;
    tp2 = entry - (entry - target) * 0.75;
  } else {
    entry = zBot; target = zTop; stop = pL - range * 0.1;
    tp1 = entry + (target - entry) * 0.5;
    tp2 = entry + (target - entry) * 0.75;
  }
  const rr = Math.abs(entry - target) / Math.abs(entry - stop);
  return { entry, target, stop, tp1, tp2, range, zTop, zBot, rr };
}

function fmt(n) { return Number(n).toFixed(2); }
function fmtMoney(n) { return '$' + (Math.abs(n) * 50).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

function auto() {
  const pH = fv('pH'), pL = fv('pL'), pC = fv('pC'), cO = fv('cO');
  if (!pH || !pL || !pC || !cO || pH <= pL) {
    document.getElementById('empty-msg').style.display = 'flex';
    return;
  }
  document.getElementById('empty-msg').style.display = 'none';

  const hour = iv('hour');
  const dow  = iv('dow');
  const vr   = parseFloat(g('vr').value);
  const vol  = parseFloat(g('vol').value);
  const cP   = fv('cP') || cO;

  // Determine direction for each signal
  const dirSel = g('dir').value;
  let detectedDir = autoDir(cP, pH, pL);

  // Calculate WR for both long and short at this hour
  const longWR  = adjustedWR((WR[hour]?.long  || [62.5])[0], hour, dow, 'long',  vr);
  const shortWR = adjustedWR((WR[hour]?.short || [62.5])[0], hour, dow, 'short', vr);
  const longN   = (WR[hour]?.long  || [0,0])[1];
  const shortN  = (WR[hour]?.short || [0,0])[1];

  // Pick winner
  let recDir, otherDir;
  if (dirSel === 'auto') {
    if (detectedDir) {
      recDir   = detectedDir;
      otherDir = detectedDir === 'long' ? 'short' : 'long';
    } else {
      recDir   = parseFloat(longWR) >= parseFloat(shortWR) ? 'long' : 'short';
      otherDir = recDir === 'long' ? 'short' : 'long';
    }
  } else {
    recDir   = dirSel;
    otherDir = dirSel === 'long' ? 'short' : 'long';
  }

  const recWR   = recDir   === 'long' ? longWR  : shortWR;
  const otherWR = otherDir === 'long' ? longWR  : shortWR;
  const recN    = recDir   === 'long' ? longN   : shortN;
  const otherN  = otherDir === 'long' ? longN   : shortN;

  const recRule   = getRule(hour, recDir,   dow, vr);
  const otherRule = getRule(hour, otherDir, dow, vr);
  const L = levels(pH, pL, recDir);

  // Tags
  const tags = [];
  if (dow !== 0) tags.push(`<span class="tag tag-green">${['Lun','Mar','Mié','Jue','Vie'][dow]}</span>`);
  else           tags.push(`<span class="tag tag-yellow">Lunes (-6%)</span>`);
  if (hour === 9)  tags.push(`<span class="tag tag-green">Primera hora — mejor ventana</span>`);
  else if (hour===10) tags.push(`<span class="tag tag-blue">Segunda hora</span>`);
  else             tags.push(`<span class="tag tag-red">Hora fuera de ventana óptima</span>`);
  if (vr >= 0.66)  tags.push(`<span class="tag tag-elite">Rango alto hist. — ELITE</span>`);
  else if (vr >= 0.33) tags.push(`<span class="tag tag-muted">Rango normal</span>`);
  else             tags.push(`<span class="tag tag-yellow">Rango comprimido</span>`);
  if (vol <= 0.6)  tags.push(`<span class="tag tag-green">Volumen bajo ✓</span>`);

  const gap = ((cO - pC) / pC * 100).toFixed(2);
  if (Math.abs(gap) > 0.05) tags.push(`<span class="tag tag-${gap>0?'green':'red'}">Gap ${gap>0?'+':''}${gap}%</span>`);

  // Entry position in range
  const entryPct = ((L.entry - pL) / (pH - pL) * 100).toFixed(1);

  // Checklist
  const checks = [
    { ok: hour === 9,    txt: `Hora 9AM ET (primera hora) — WR ${(WR[9]?.[recDir]||[0])[0]}% histórico` },
    { ok: dow !== 0,     txt: `No es Lunes${dow===2?' — Miércoles tiene 99.2% WR':''}`    },
    { ok: vr >= 0.66,    txt: `Rango previo alto histórico (ELITE — 100% WR)` },
    { ok: vol <= 0.6,    txt: `Volumen de toque muy bajo (exhaustion confirmado)` },
    { ok: true,          txt: `Precio en zona 25% del rango previo` },
  ];

  // Hour chart: highlight selected direction
  const hourChart = HOURS.map(hd => {
    const wr  = recDir === 'long' ? hd.long : hd.short;
    const cls = hd.cls;
    const isSelected = hd.h === hour;
    const border = isSelected ? 'outline: 2px solid var(--blue); outline-offset: 2px;' : '';
    const bestDir = hd.long >= hd.short ? '↑' : '↓';
    const bestDirWR = Math.max(hd.long, hd.short);
    return `
      <div class="hr-row" style="${isSelected ? 'background:#58a6ff08;border-radius:6px;padding:2px 4px;margin:0 -4px' : ''}">
        <span class="hr-time">${hd.label}</span>
        <div class="hr-bar-wrap">
          <div class="hr-bar ${cls}" style="width:${wr}%">${wr >= 70 ? wr + '%' : ''}</div>
        </div>
        <span class="hr-wr" style="color:${wr>=90?'var(--green)':wr>=80?'var(--blue)':wr>=70?'var(--yellow)':'var(--red)'}">${wr}%</span>
        <span class="hr-n">${hd.n}tr</span>
        <span class="hr-dir" style="color:var(--muted);font-size:10px">${bestDir}${bestDirWR}%</span>
      </div>`;
  }).join('');

  // Yearly mini chart
  const yearBars = YEARLY.map(d => `
    <div style="display:flex;align-items:center;gap:6px;padding:2px 0">
      <span style="font-size:10px;color:var(--muted);width:32px">${d.y}</span>
      <div style="flex:1;height:12px;background:#ffffff06;border-radius:3px;overflow:hidden">
        <div style="width:${d.wr}%;height:100%;background:${d.wr>=90?'var(--green)':d.wr>=80?'var(--blue)':'var(--yellow)'};border-radius:3px"></div>
      </div>
      <span style="font-size:10px;font-family:monospace;color:${d.wr>=90?'var(--green)':d.wr>=80?'var(--blue)':'var(--yellow)'};width:36px;text-align:right">${d.wr}%</span>
    </div>`).join('');

  const isElite = vr >= 0.66 && hour === 9;
  const recColor = parseFloat(recWR) >= 90 ? 'var(--green)' : parseFloat(recWR) >= 80 ? 'var(--blue)' : 'var(--yellow)';

  document.getElementById('out').innerHTML = `

  <!-- ── SIGNAL HERO ── -->
  <div class="signal-hero">
    <div class="signal-hero-top">

      <!-- WINNER -->
      <div class="sig-box winner" style="border-color:${recColor}; background:${recColor}11">
        <div class="sig-dir" style="color:${recColor}">${recDir === 'long' ? '↑ LONG' : '↓ SHORT'}</div>
        <div class="sig-wr"  style="color:${recColor}">${recWR}%</div>
        <div class="sig-rule" style="color:${recColor}">${recRule.label}</div>
        <div class="sig-n">${recN} trades verificados</div>
      </div>

      <!-- VS -->
      <div class="vs-col">
        <div class="vs-label">VS</div>
        <div class="vs-rec" style="color:${recColor};font-weight:700;margin-top:4px">TOMAR ${recDir.toUpperCase()}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">mayor probabilidad</div>
      </div>

      <!-- OTHER -->
      <div class="sig-box loser">
        <div class="sig-dir" style="color:var(--muted)">${otherDir === 'long' ? '↑ LONG' : '↓ SHORT'}</div>
        <div class="sig-wr"  style="color:var(--muted)">${otherWR}%</div>
        <div class="sig-rule">${otherRule.label}</div>
        <div class="sig-n">${otherN} trades</div>
      </div>
    </div>

    <div class="signal-hero-bot">
      ${tags.join('')}
    </div>
  </div>

  <!-- ── HOUR CHART ── -->
  <div class="hour-chart">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="sec-label" style="margin:0">Win Rate por Hora — dirección ${recDir.toUpperCase()}</div>
      <div class="best-hour-badge">★ Mejor hora: 9:00 AM ET (${(WR[9]?.[recDir]||[0])[0]}%)</div>
    </div>
    <div class="hour-rows">${hourChart}</div>
    <div style="margin-top:10px;font-size:11px;color:var(--muted)">
      Hora resaltada = tu selección actual &nbsp;·&nbsp; Columna derecha = mejor dirección por hora
    </div>
  </div>

  <!-- ── LEVELS ── -->
  <div class="levels-card">
    <div class="levels-hdr">
      <h3>Niveles — ${recDir.toUpperCase()} desde zona ${recDir === 'long' ? 'baja (25%)' : 'alta (25%)'}</h3>
      <div class="rr-pill">R:R ${L.rr.toFixed(2)}x · ${L.range.toFixed(2)} pts rango</div>
    </div>
    <table>
      <thead><tr><th>Nivel</th><th>Precio</th><th>Puntos</th><th>$/ES</th></tr></thead>
      <tbody>
        <tr class="row-stop">
          <td class="c-red">STOP LOSS</td>
          <td class="mono c-red">${fmt(L.stop)}</td>
          <td class="c-red">-${Math.abs(L.entry - L.stop).toFixed(2)}</td>
          <td class="c-red">-${fmtMoney(L.entry - L.stop)}</td>
        </tr>
        <tr class="row-entry">
          <td class="c-blue">ENTRADA — zona 25%</td>
          <td class="mono c-blue">${fmt(L.entry)}</td>
          <td class="c-muted">—</td>
          <td class="c-muted">—</td>
        </tr>
        <tr>
          <td class="c-yellow">TP1 — 50% del recorrido</td>
          <td class="mono c-yellow">${fmt(L.tp1)}</td>
          <td class="c-yellow">+${Math.abs(L.tp1 - L.entry).toFixed(2)}</td>
          <td class="c-yellow">+${fmtMoney(L.tp1 - L.entry)}</td>
        </tr>
        <tr>
          <td style="color:#7ee787">TP2 — 75% del recorrido</td>
          <td class="mono" style="color:#7ee787">${fmt(L.tp2)}</td>
          <td style="color:#7ee787">+${Math.abs(L.tp2 - L.entry).toFixed(2)}</td>
          <td style="color:#7ee787">+${fmtMoney(L.tp2 - L.entry)}</td>
        </tr>
        <tr class="row-target">
          <td class="c-green">TARGET — zona 75% (extremo contrario)</td>
          <td class="mono c-green">${fmt(L.target)}</td>
          <td class="c-green">+${Math.abs(L.target - L.entry).toFixed(2)}</td>
          <td class="c-green">+${fmtMoney(L.target - L.entry)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ── RANGE VISUAL ── -->
  <div class="range-card">
    <div class="sec-label" style="margin-bottom:8px">Mapa del Rango Previo</div>
    <div class="rng-bar">
      <div class="rng-z-low"  style="width:25%"></div>
      <div class="rng-z-high" style="width:25%"></div>
      <div class="rng-cursor" style="left:${entryPct}%"></div>
    </div>
    <div class="rng-labels">
      <span class="c-red">▼ LOW ${fmt(pL)}<br><small>Zona LONG entrada</small></span>
      <span style="color:var(--muted);text-align:center">Medio<br>${fmt((pH+pL)/2)}</span>
      <span class="c-green" style="text-align:right">HIGH ${fmt(pH)} ▲<br><small>Zona SHORT entrada</small></span>
    </div>
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
      <div style="padding:8px;background:var(--bg);border-radius:6px;border:1px solid #f8514922">
        <div class="c-red" style="font-size:10px;margin-bottom:4px">ZONA LONG (bottom 25%)</div>
        <span style="font-family:monospace">${fmt(pL)} → ${fmt(L.zBot)}</span>
      </div>
      <div style="padding:8px;background:var(--bg);border-radius:6px;border:1px solid #3fb95022">
        <div class="c-green" style="font-size:10px;margin-bottom:4px">ZONA SHORT (top 25%)</div>
        <span style="font-family:monospace">${fmt(L.zTop)} → ${fmt(pH)}</span>
      </div>
    </div>
  </div>

  <!-- ── CHECKLIST ── -->
  <div class="check-card">
    <div class="sec-label">Checklist de Calidad</div>
    ${checks.map(c => `
      <div class="chk-item ${c.ok ? 'pass' : 'fail'}">
        <span class="chk-icon" style="color:${c.ok ? 'var(--green)' : 'var(--muted)'}">${c.ok ? '✓' : '○'}</span>
        <span class="chk-text" style="color:${c.ok ? 'var(--text)' : 'var(--muted)'}">${c.txt}</span>
      </div>`).join('')}
    <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:6px;font-size:12px">
      <span style="color:var(--muted)">Score del setup: </span>
      <span style="color:${checks.filter(c=>c.ok).length>=4?'var(--green)':checks.filter(c=>c.ok).length>=3?'var(--yellow)':'var(--red)'}; font-weight:700">
        ${checks.filter(c=>c.ok).length}/${checks.length} — ${checks.filter(c=>c.ok).length>=4?'EXCELENTE':checks.filter(c=>c.ok).length>=3?'BUENO':'ESPERAR MEJOR SETUP'}
      </span>
    </div>
  </div>

  <!-- ── BACKTEST ANUAL ── -->
  <div class="check-card">
    <div class="sec-label">Backtest Año a Año (base — todos los setups)</div>
    <div style="margin-top:8px">${yearBars}</div>
    <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
      <div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px">
        <div style="font-size:18px;font-weight:700;color:var(--elite)">100%</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">WR ELITE</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px">
        <div style="font-size:18px;font-weight:700;color:var(--green)">96.1%</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">WR 9AM+Long</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px">
        <div style="font-size:18px;font-weight:700;color:var(--blue)">82.6%</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">WR Base</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px">
        <div style="font-size:18px;font-weight:700;color:var(--purple)">0.723</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">AUC XGBoost</div>
      </div>
    </div>
  </div>

  <div style="background:#e3b34108;border:1px solid #e3b34122;border-radius:8px;padding:10px 14px;font-size:11px;color:var(--muted)">
    ⚠️ Backtest 2015–2026 · 1,092 setups · Validación walk-forward sin lookahead. Rendimiento pasado no garantiza resultados futuros.
  </div>`;
}

function example() {
  g('pH').value  = 6983.75;
  g('pL').value  = 6892.25;
  g('pC').value  = 6948.50;
  g('cO').value  = 6948.50;
  g('cP').value  = 6965.00;
  g('dow').value = 3;
  g('hour').value= 9;
  g('vr').value  = 0.85;
  g('vol').value = 0.3;
  g('dir').value = 'auto';
  auto();
}
</script>
</body>
