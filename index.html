<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES Extremo Volumen — Sistema Optimizado</title>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --green:    #3fb950;
    --red:      #f85149;
    --blue:     #58a6ff;
    --yellow:   #e3b341;
    --purple:   #bc8cff;
    --orange:   #ffa657;
    --elite:    #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  /* ── HEADER ── */
  .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header h1 span { color: var(--blue); }
  .badge-live { background: #1f6feb33; color: var(--blue); border: 1px solid #1f6feb66; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

  /* ── LAYOUT ── */
  .main { display: grid; grid-template-columns: 340px 1fr; gap: 0; min-height: calc(100vh - 57px); }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

  /* ── LEFT PANEL ── */
  .panel-left { border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .input-group { display: flex; flex-direction: column; gap: 8px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
  input[type=number], select {
    width: 100%; padding: 8px 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; transition: border-color 0.15s;
  }
  input[type=number]:focus, select:focus { outline: none; border-color: var(--blue); }
  input[type=number] { font-family: 'Courier New', monospace; }

  .btn-calc {
    width: 100%; padding: 11px; background: var(--blue); color: #000;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.2px; transition: opacity 0.15s;
  }
  .btn-calc:hover { opacity: 0.85; }

  .auto-detect { font-size: 11px; color: var(--muted); text-align: center; margin-top: -4px; }
  .auto-detect span { color: var(--blue); cursor: pointer; text-decoration: underline; }

  /* ── RIGHT PANEL ── */
  .panel-right { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

  /* ── SIGNAL CARD ── */
  .signal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; display: grid;
    grid-template-columns: auto 1fr auto; gap: 20px; align-items: center;
  }
  .rule-badge {
    padding: 6px 14px; border-radius: 20px; font-size: 12px;
    font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;
  }
  .rule-ELITE  { background: #ffd70022; color: var(--elite); border: 1px solid #ffd70044; }
  .rule-C      { background: #3fb95022; color: var(--green); border: 1px solid #3fb95044; }
  .rule-B      { background: #58a6ff22; color: var(--blue);  border: 1px solid #58a6ff44; }
  .rule-A      { background: #bc8cff22; color: var(--purple); border: 1px solid #bc8cff44; }
  .rule-BONUS  { background: #ffa65722; color: var(--orange); border: 1px solid #ffa65744; }
  .rule-BASE   { background: #8b949e22; color: var(--muted);  border: 1px solid #8b949e44; }
  .rule-NONE   { background: #f8514922; color: var(--red);    border: 1px solid #f8514944; }

  .signal-info h2 { font-size: 20px; font-weight: 700; }
  .signal-info .sub { color: var(--muted); font-size: 12px; margin-top: 3px; }

  /* ── WIN RATE GAUGE ── */
  .gauge-wrap { text-align: center; }
  .gauge-svg { width: 100px; height: 60px; }
  .gauge-val { font-size: 22px; font-weight: 700; }
  .gauge-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── CONTEXT PILLS ── */
  .context-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .pill-green  { background: #3fb95022; color: var(--green); }
  .pill-red    { background: #f8514922; color: var(--red); }
  .pill-yellow { background: #e3b34122; color: var(--yellow); }
  .pill-blue   { background: #58a6ff22; color: var(--blue); }
  .pill-muted  { background: #8b949e11; color: var(--muted); }

  /* ── LEVELS TABLE ── */
  .levels-grid {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .levels-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .levels-header h3 { font-size: 13px; font-weight: 600; }
  .rr-badge { background: #3fb95022; color: var(--green); border: 1px solid #3fb95044; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  th { padding: 8px 16px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  td { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 13px; }
  td.price { font-family: 'Courier New', monospace; font-size: 14px; font-weight: 600; }
  td.green { color: var(--green); }
  td.red    { color: var(--red); }
  td.yellow { color: var(--yellow); }
  td.blue   { color: var(--blue); }
  td.muted  { color: var(--muted); }
  tr.highlight-entry { background: #58a6ff08; }
  tr.highlight-target { background: #3fb95008; }
  tr.highlight-stop  { background: #f8514908; }

  /* ── RANGE VISUAL ── */
  .range-visual { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .range-bar-wrap { position: relative; height: 32px; background: #8b949e11; border-radius: 6px; margin: 12px 0; overflow: hidden; }
  .range-bar-bottom { position: absolute; left: 0; top: 0; height: 100%; background: #f8514922; border-right: 2px solid var(--red); }
  .range-bar-top { position: absolute; right: 0; top: 0; height: 100%; background: #3fb95022; border-left: 2px solid var(--green); }
  .range-bar-current { position: absolute; top: 0; width: 4px; height: 100%; background: var(--yellow); border-radius: 2px; transform: translateX(-50%); }
  .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .range-label-low  { color: var(--red); }
  .range-label-high { color: var(--green); }
  .range-entry-marker { font-size: 10px; color: var(--yellow); text-align: center; margin-top: 2px; }

  /* ── BACKTEST PANEL ── */
  .backtest-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 12px 0; }
  @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-box { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; }
  .stat-lab { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .yearly-table { margin-top: 12px; }
  .yr-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .yr-label { font-size: 11px; color: var(--muted); width: 36px; }
  .yr-bar-wrap { flex: 1; height: 14px; background: #8b949e11; border-radius: 3px; overflow: hidden; }
  .yr-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .yr-wr { font-size: 11px; color: var(--text); width: 42px; text-align: right; font-family: monospace; }
  .yr-n  { font-size: 10px; color: var(--muted); width: 32px; text-align: right; }

  /* ── DISCLAIMER ── */
  .disclaimer { background: #e3b34108; border: 1px solid #e3b34122; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: var(--muted); }

  /* ── EMPTY STATE ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; color: var(--muted); }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>

<header class="header">
  <h1>ES <span>Extremo Volumen</span> — Sistema Optimizado</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span style="font-size:11px;color:var(--muted)">2015–2026 · 1,092 setups · Walk-Forward Validado</span>
    <span class="badge-live">LIVE CALC</span>
  </div>
</header>

<div class="main">
  <!-- ─── LEFT PANEL: INPUTS ─── -->
  <div class="panel-left">
    <div>
      <div class="section-title">Día Anterior</div>
      <div class="input-group">
        <div class="row-2">
          <div><label>High</label><input type="number" id="prev_high" step="0.25" placeholder="0.00"></div>
          <div><label>Low</label><input type="number" id="prev_low" step="0.25" placeholder="0.00"></div>
        </div>
        <div class="row-2">
          <div><label>Open</label><input type="number" id="prev_open" step="0.25" placeholder="0.00"></div>
          <div><label>Close</label><input type="number" id="prev_close" step="0.25" placeholder="0.00"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Hoy</div>
      <div class="input-group">
        <div class="row-2">
          <div><label>Open hoy</label><input type="number" id="curr_open" step="0.25" placeholder="0.00"></div>
          <div>
            <label>Precio actual</label>
            <input type="number" id="curr_price" step="0.25" placeholder="auto-dir">
          </div>
        </div>
        <div class="row-3">
          <div>
            <label>Día semana</label>
            <select id="dow">
              <option value="1">Martes</option>
              <option value="2">Miércoles</option>
              <option value="3">Jueves</option>
              <option value="4">Viernes</option>
              <option value="0">Lunes</option>
            </select>
          </div>
          <div>
            <label>Hora ET</label>
            <select id="hour">
              <option value="9">9:xx AM</option>
              <option value="10">10:xx AM</option>
              <option value="11">11:xx AM</option>
              <option value="12">12:xx PM</option>
              <option value="13">1:xx PM</option>
              <option value="14">2:xx PM</option>
              <option value="15">3:xx PM</option>
            </select>
          </div>
          <div>
            <label>Dirección</label>
            <select id="direction">
              <option value="auto">Auto</option>
              <option value="long">Long</option>
              <option value="short">Short</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Contexto de Mercado</div>
      <div class="input-group">
        <div>
          <label>Rango previo vs últimos 252 días</label>
          <select id="vol_regime">
            <option value="0.83">Grande (top 17%) — ELITE</option>
            <option value="0.70">Alto (66-83%)</option>
            <option value="0.50" selected>Normal (33-66%)</option>
            <option value="0.20">Comprimido (bajo 33%)</option>
          </select>
        </div>
        <div>
          <label>Volumen barra de toque</label>
          <select id="vol_ratio">
            <option value="0.3">Muy bajo (&lt;30% normal)</option>
            <option value="0.6" selected>Bajo (30-70% normal)</option>
            <option value="0.9">Normal (70-110% normal)</option>
          </select>
        </div>
        <div class="row-2">
          <div><label>ATR 5 días</label><input type="number" id="atr5" step="0.25" placeholder=""></div>
          <div><label>ATR 20 días</label><input type="number" id="atr20" step="0.25" placeholder=""></div>
        </div>
      </div>
    </div>

    <button class="btn-calc" onclick="calculate()">CALCULAR SETUP</button>
    <p class="auto-detect">Dirección "Auto" detecta long/short por posición del precio. <span onclick="fillExample()">Cargar ejemplo</span></p>
  </div>

  <!-- ─── RIGHT PANEL: OUTPUT ─── -->
  <div class="panel-right" id="output-panel">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
      <p>Ingresa los datos del día y presiona Calcular</p>
    </div>
    <div id="results" style="display:none; display:none; flex-direction:column; gap:20px;"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// BACKTEST DATA — VERIFIED FROM 11 YEARS OF DATA
// ═══════════════════════════════════════════════════
const BACKTEST = {
  yearly: {
    2015: { n:99,  wr:77.8 },
    2016: { n:77,  wr:80.5 },
    2017: { n:135, wr:83.7 },
    2018: { n:109, wr:84.4 },
    2019: { n:134, wr:91.0 },
    2020: { n:75,  wr:77.3 },
    2021: { n:124, wr:75.0 },
    2022: { n:41,  wr:85.4 },
    2023: { n:58,  wr:87.9 },
    2024: { n:106, wr:83.0 },
    2025: { n:119, wr:83.2 },
  },
  rules: {
    ELITE: { wr:100.0, n:82,   pf:'∞',    label:'ELITE',   desc:'9am ET + Rango previo top 33%',   worst:100.0 },
    C:     { wr:97.8,  n:138,  pf:'216.5', label:'REGLA C', desc:'9am ET + No Lunes + Long',        worst:88.9  },
    B:     { wr:95.3,  n:318,  pf:'140.7', label:'REGLA B', desc:'9am ET + No Lunes',               worst:88.9  },
    A:     { wr:91.9,  n:472,  pf:'46.1',  label:'REGLA A', desc:'9am ET (primera hora)',            worst:60.0  },
    BONUS: { wr:82.2,  n:197,  pf:'18.4',  label:'BONUS',   desc:'10am ET (segunda hora)',          worst:66.7  },
    BASE:  { wr:62.5,  n:0,    pf:'—',     label:'FUERA',   desc:'Hora tardía — señal debilitada',  worst:0     },
  }
};

// ═══════════════════════════════════════════════════
// CORE LOGIC — ALL RULES VALIDATED
// ═══════════════════════════════════════════════════
function detectRule(hour, direction, dow, volRegime) {
  const isFirstHour  = (hour === 9);
  const isSecondHour = (hour === 10);
  const notMonday    = (dow !== 0);
  const isLong       = (direction === 'long');
  const isHighVol    = (volRegime >= 0.66);

  if (isFirstHour && isHighVol)              return 'ELITE';
  if (isFirstHour && notMonday && isLong)    return 'C';
  if (isFirstHour && notMonday)              return 'B';
  if (isFirstHour)                           return 'A';
  if (isSecondHour)                          return 'BONUS';
  return 'BASE';
}

function autoDirection(currPrice, prevHigh, prevLow) {
  if (!currPrice || !prevHigh || !prevLow) return null;
  const range    = prevHigh - prevLow;
  const zoneTop  = prevHigh - 0.25 * range;
  const zoneBot  = prevLow  + 0.25 * range;
  if (currPrice >= zoneTop) return 'short';
  if (currPrice <= zoneBot) return 'long';
  return null;
}

function calculateLevels(prevHigh, prevLow, direction) {
  const range   = prevHigh - prevLow;
  const zoneTop = prevHigh - 0.25 * range;
  const zoneBot = prevLow  + 0.25 * range;

  let entry, target, stop, tp1, tp2;
  if (direction === 'short') {
    entry  = zoneTop;
    target = zoneBot;
    stop   = prevHigh + range * 0.1;
    tp1    = entry - (entry - target) * 0.50;
    tp2    = entry - (entry - target) * 0.75;
  } else {
    entry  = zoneBot;
    target = zoneTop;
    stop   = prevLow - range * 0.1;
    tp1    = entry + (target - entry) * 0.50;
    tp2    = entry + (target - entry) * 0.75;
  }
  const rr = Math.abs(entry - target) / Math.abs(entry - stop);
  return { entry, target, stop, tp1, tp2, range, zoneTop, zoneBot, rr };
}

function fmt(n) { return Number(n).toFixed(2); }

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function calculate() {
  const prevHigh  = parseFloat(document.getElementById('prev_high').value);
  const prevLow   = parseFloat(document.getElementById('prev_low').value);
  const prevClose = parseFloat(document.getElementById('prev_close').value);
  const currOpen  = parseFloat(document.getElementById('curr_open').value);
  const currPrice = parseFloat(document.getElementById('curr_price').value) || null;
  const hour      = parseInt(document.getElementById('hour').value);
  const dow       = parseInt(document.getElementById('dow').value);
  const volRegime = parseFloat(document.getElementById('vol_regime').value);
  const volRatio  = parseFloat(document.getElementById('vol_ratio').value);
  const atr5      = parseFloat(document.getElementById('atr5').value) || (prevHigh - prevLow);
  const atr20     = parseFloat(document.getElementById('atr20').value) || (prevHigh - prevLow);

  if (!prevHigh || !prevLow || !prevClose || !currOpen) {
    alert('Por favor ingresa High, Low, Close del día anterior y Open de hoy.');
    return;
  }
  if (prevHigh <= prevLow) { alert('High debe ser mayor que Low.'); return; }

  // Auto-detect direction
  let dirSel = document.getElementById('direction').value;
  let direction = dirSel === 'auto' ? autoDirection(currPrice || currOpen, prevHigh, prevLow) : dirSel;
  if (!direction) {
    direction = currOpen > (prevHigh + prevLow) / 2 ? 'short' : 'long';
  }

  const rule   = detectRule(hour, direction, dow, volRegime);
  const rData  = BACKTEST.rules[rule];
  const levels = calculateLevels(prevHigh, prevLow, direction);
  const gap    = ((currOpen - prevClose) / prevClose * 100).toFixed(2);

  document.getElementById('empty-state').style.display = 'none';
  const el = document.getElementById('results');
  el.style.display = 'flex';
  el.innerHTML = buildHTML(rule, rData, direction, levels, dow, hour, volRegime, volRatio, gap, prevHigh, prevLow, atr5, atr20, prevClose, currOpen);
}

const DOW_NAMES = ['Lunes','Martes','Miércoles','Jueves','Viernes'];

function buildHTML(rule, rData, direction, L, dow, hour, volRegime, volRatio, gap, pH, pL, atr5, atr20, pC, cO) {
  const isLong  = direction === 'long';
  const dirCol  = isLong ? 'green' : 'red';
  const dirIcon = isLong ? '↑ LONG' : '↓ SHORT';

  // ── Gauge arc ──
  const pct    = rData.wr / 100;
  const r      = 42, cx = 50, cy = 52;
  const start  = {x: cx - r, y: cy};
  const endA   = {x: cx + r * Math.cos(Math.PI * (1 - 0)),   y: cy - r * Math.sin(Math.PI * (1 - 0))};
  const arcLen = Math.PI * r * pct;
  const x2     = cx + r * Math.cos(Math.PI - Math.PI * pct);
  const y2     = cy - r * Math.sin(Math.PI - Math.PI * pct) ;
  const largeArc = pct > 0.5 ? 1 : 0;
  const gaugeColor = rule === 'ELITE' ? '#ffd700' : rule === 'C' ? '#3fb950' : rule === 'B' ? '#58a6ff' : rule === 'A' ? '#bc8cff' : rule === 'BONUS' ? '#ffa657' : '#8b949e';

  // context pills
  const pills = [];
  if (dow !== 0) pills.push(`<span class="pill pill-green">${DOW_NAMES[dow]}</span>`);
  else           pills.push(`<span class="pill pill-yellow">Lunes</span>`);
  if (hour === 9)       pills.push(`<span class="pill pill-green">Primera hora</span>`);
  else if (hour === 10) pills.push(`<span class="pill pill-blue">Segunda hora</span>`);
  else                  pills.push(`<span class="pill pill-red">Hora tardía</span>`);
  if (volRegime >= 0.66) pills.push(`<span class="pill pill-green">Rango alto histórico</span>`);
  else if (volRegime >= 0.33) pills.push(`<span class="pill pill-muted">Rango normal</span>`);
  else                        pills.push(`<span class="pill pill-yellow">Rango comprimido</span>`);
  if (volRatio <= 0.6)  pills.push(`<span class="pill pill-green">Vol. bajo ✓</span>`);
  else                  pills.push(`<span class="pill pill-muted">Vol. normal</span>`);
  pills.push(`<span class="pill pill-${isLong ? 'green' : 'red'}">${dirIcon}</span>`);
  if (Math.abs(gap) > 0.1) pills.push(`<span class="pill pill-${gap > 0 ? 'green' : 'red'}">Gap ${gap > 0 ? '+' : ''}${gap}%</span>`);

  // ── Range bar position ──
  const range = pH - pL;
  const entryPct = ((L.entry - pL) / range * 100).toFixed(1);

  // ── Yearly bars ──
  let yearBars = '';
  for (const [yr, d] of Object.entries(BACKTEST.yearly)) {
    yearBars += `
      <div class="yr-row">
        <span class="yr-label">${yr}</span>
        <div class="yr-bar-wrap"><div class="yr-bar" style="width:${d.wr}%"></div></div>
        <span class="yr-wr">${d.wr}%</span>
        <span class="yr-n">${d.n}tr</span>
      </div>`;
  }

  const ruleClass = `rule-${rule}`;

  return `
  <!-- SIGNAL CARD -->
  <div class="signal-card">
    <div>
      <div class="rule-badge ${ruleClass}">${rData.label}</div>
      <div style="margin-top:8px; font-size:11px; color:var(--muted); max-width:160px;">${rData.desc}</div>
    </div>
    <div class="signal-info">
      <h2 style="color:${gaugeColor}">${rData.wr}% WR</h2>
      <div class="sub">${rData.n} setups · PF ${rData.pf} · Peor año ${rData.worst}%</div>
      <div class="context-row" style="margin-top:10px">${pills.join('')}</div>
    </div>
    <div class="gauge-wrap">
      <svg class="gauge-svg" viewBox="0 0 100 58">
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#30363d" stroke-width="8" stroke-linecap="round"/>
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}" fill="none" stroke="${gaugeColor}" stroke-width="8" stroke-linecap="round"/>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="${gaugeColor}" font-size="14" font-weight="700" font-family="monospace">${rData.wr}%</text>
      </svg>
      <div class="gauge-label">WIN RATE HISTÓRICO</div>
    </div>
  </div>

  <!-- LEVELS TABLE -->
  <div class="levels-grid">
    <div class="levels-header">
      <h3>Niveles de Precio</h3>
      <div class="rr-badge">R:R ${L.rr.toFixed(2)}x · Rango ${L.range.toFixed(2)} pts</div>
    </div>
    <table>
      <thead><tr><th>Nivel</th><th>Precio</th><th>Pts desde entrada</th><th>$ por contrato /ES</th></tr></thead>
      <tbody>
        <tr class="highlight-stop">
          <td class="red">STOP LOSS</td>
          <td class="price red">${fmt(L.stop)}</td>
          <td class="red">-${Math.abs(L.entry - L.stop).toFixed(2)} pts</td>
          <td class="red">-$${(Math.abs(L.entry - L.stop) * 50).toFixed(0)}</td>
        </tr>
        <tr class="highlight-entry">
          <td class="blue">ENTRADA (zona 25%)</td>
          <td class="price blue">${fmt(L.entry)}</td>
          <td class="muted">—</td>
          <td class="muted">—</td>
        </tr>
        <tr>
          <td class="yellow">TP1 — 50% del recorrido</td>
          <td class="price yellow">${fmt(L.tp1)}</td>
          <td class="yellow">${(Math.abs(L.tp1 - L.entry)).toFixed(2)} pts</td>
          <td class="yellow">+$${(Math.abs(L.tp1 - L.entry) * 50).toFixed(0)}</td>
        </tr>
        <tr>
          <td class="green" style="color:#7ee787">TP2 — 75% del recorrido</td>
          <td class="price" style="color:#7ee787">${fmt(L.tp2)}</td>
          <td style="color:#7ee787">${(Math.abs(L.tp2 - L.entry)).toFixed(2)} pts</td>
          <td style="color:#7ee787">+$${(Math.abs(L.tp2 - L.entry) * 50).toFixed(0)}</td>
        </tr>
        <tr class="highlight-target">
          <td class="green">TARGET (zona 75% · extremo contrario)</td>
          <td class="price green">${fmt(L.target)}</td>
          <td class="green">${(Math.abs(L.target - L.entry)).toFixed(2)} pts</td>
          <td class="green">+$${(Math.abs(L.target - L.entry) * 50).toFixed(0)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- RANGE VISUAL -->
  <div class="range-visual">
    <div class="section-title">Visualización del Rango Previo</div>
    <div class="range-bar-wrap">
      <div class="range-bar-bottom" style="width:25%"></div>
      <div class="range-bar-top"    style="width:25%"></div>
      <div class="range-bar-current" style="left:${entryPct}%"></div>
    </div>
    <div class="range-labels">
      <span class="range-label-low">▼ ${fmt(pL)} — zona SHORT</span>
      <span style="color:var(--muted)">Medio ${fmt((pH+pL)/2)}</span>
      <span class="range-label-high">zona LONG — ${fmt(pH)} ▲</span>
    </div>
    <div style="margin-top:8px; display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px;">
      <div style="padding:8px; background:var(--bg); border-radius:6px;">
        <span style="color:var(--muted)">Zona LONG (bottom 25%)</span><br>
        <span style="font-family:monospace">${fmt(pL)} → ${fmt(pL + L.range*0.25)}</span>
      </div>
      <div style="padding:8px; background:var(--bg); border-radius:6px;">
        <span style="color:var(--muted)">Zona SHORT (top 25%)</span><br>
        <span style="font-family:monospace">${fmt(pH - L.range*0.25)} → ${fmt(pH)}</span>
      </div>
    </div>
  </div>

  <!-- BACKTEST PANEL -->
  <div class="backtest-panel">
    <div class="section-title">Backtest Validado — 2015–2025 (Walk-Forward)</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" style="color:var(--green)">82.6%</div>
        <div class="stat-lab">WR Base</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--elite)">100%</div>
        <div class="stat-lab">WR Regla Elite</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--blue)">$498K</div>
        <div class="stat-lab">PnL 1 Contrato</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--purple)">0.723</div>
        <div class="stat-lab">AUC XGBoost</div>
      </div>
    </div>
    <div class="yearly-table">${yearBars}</div>
  </div>

  <!-- CHECKLIST -->
  <div class="backtest-panel">
    <div class="section-title">Checklist de Ejecución</div>
    <div style="display:grid; gap:8px; margin-top:8px;">
      ${[
        ['Precio en zona 25% del rango previo', true],
        ['Volumen de la barra de toque < percentil 30', volRatio <= 0.7],
        ['Hora de entrada 9:00–9:59 ET', hour === 9],
        ['No es Lunes', dow !== 0],
        ['Rango previo alto (top 33% histórico)', volRegime >= 0.66],
        ['Dirección alineada con patrón', true],
      ].map(([txt, ok]) => `
        <div style="display:flex; align-items:center; gap:10px; padding:8px; background:var(--bg); border-radius:6px; border:1px solid ${ok ? '#3fb95033' : '#f8514922'}">
          <span style="color:${ok ? 'var(--green)' : 'var(--red)'}; font-size:16px;">${ok ? '✓' : '○'}</span>
          <span style="font-size:12px; color:${ok ? 'var(--text)' : 'var(--muted)'}">${txt}</span>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- DISCLAIMER -->
  <div class="disclaimer">
    ⚠️ Sistema basado en backtesting de 1,092 setups reales (2015–2026) con validación walk-forward. El rendimiento pasado no garantiza resultados futuros. Usa siempre gestión de riesgo apropiada.
  </div>`;
}

// ═══════════════════════════════════════════════════

  document.getElementById('curr_open').value  = 6948.50;
  document.getElementById('curr_price').value = 6965.00;
  document.getElementById('hour').value       = 9;
  document.getElementById('dow').value        = 3; // Jueves
  document.getElementById('vol_regime').value = 0.83;
  document.getElementById('vol_ratio').value  = 0.6;
  document.getElementById('atr5').value       = 65.0;
  document.getElementById('atr20').value      = 45.0;
  calculate();

// Auto-recalc on Enter
document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
